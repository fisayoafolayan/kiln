version: 1

database:
  driver: "postgres"
  dsn_env: DATABASE_URL

output:
  dir: "./generated"
  package: generated

api:
  base_path: "/api/v1"
  framework: chi

auth:
  strategy: api_key
  header: X-API-Key

bob:
  enabled: true
  models_dir: "./models"

generate:
  models: true
  store: true
  handlers: true
  router: true
  openapi: true

openapi:
  enabled: true
  output: "./docs/openapi.yaml"
  title: "Blog API"
  version: "1.0.0"
  description: "A blog API generated by kiln"

tables:
  exclude: []

overrides:
  users:
    hidden_fields:
      - password_hash
    readonly_fields:
      - created_at
      - updated_at
    filterable_fields:
      - email
      - role
      - created_at
    sortable_fields:
      - created_at
      - name
  posts:
    readonly_fields:
      - created_at
      - updated_at
    filterable_fields:
      - user_id
      - status
      - created_at
      - published_at
    sortable_fields:
      - created_at
      - published_at
      - title
